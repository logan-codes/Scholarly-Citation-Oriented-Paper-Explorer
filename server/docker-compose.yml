version: "1.0"

services:
  server:
    build: .
    container_name: scope-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URL=postgresql://admin:admin123@postgres:5432/appdb
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - postgres
      - qdrant
    volumes:
      - ./app.log:/app/app.log
    env_file:
      - .env

  postgres:
    image: postgres:16
    container_name: postgres-db-scope
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db-scope
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7
    container_name: redis-cache-scope
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
  qdrant_data: